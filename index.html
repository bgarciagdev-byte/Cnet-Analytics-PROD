<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CentroNet Analytics</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg-2:#020617;
      --fg:#e2e8f0;
      --muted:#94a3b8;
      --accent:#22d3ee;
      --accent-2:#38bdf8;
      --border:#1f2937;
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      margin:0;
    }

    body{
      font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;
      background:linear-gradient(180deg,var(--bg),var(--bg-2));
      color:var(--fg);
      overflow:hidden;
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.18;
      z-index:-1;
      pointer-events:none;
    }

    .app{
      height:100vh;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    main{
      width:100%;
      max-width:1200px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .menu-grid{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .title{
      margin:0;
      font-size:22px;
      font-weight:600;
    }

    .subtitle{
      margin:0;
      font-size:14px;
      color:var(--muted);
    }

    /* NUEVO: bloques de sección */
    .section{
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(2,6,23,.55);
      padding:14px;
    }

    .section-header{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .section-title{
      margin:0;
      font-size:16px;
      font-weight:600;
    }

    .section-desc{
      margin:0;
      font-size:12px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:12px;
    }

    .rbtn{
      appearance:none;
      border-radius:14px;
      border:1px solid var(--border);
      padding:16px 14px;
      background:rgba(15,23,42,.9);
      color:var(--fg);
      cursor:pointer;
      font-size:15px;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:6px;
      transition:.18s transform, .18s box-shadow, .18s border-color, .18s background;
    }

    .rbtn span{ font-weight:500; }

    .rbtn small{
      font-size:12px;
      color:var(--muted);
    }

    .rbtn:hover{
      transform:translateY(-2px);
      border-color:var(--accent);
      box-shadow:0 10px 30px rgba(15,23,42,.6);
      background:radial-gradient(circle at top,var(--accent-2)15%,#020617 70%);
    }

    .viewer{
      position:relative;
      flex:1;
      border-radius:18px;
      border:1px solid var(--border);
      overflow:hidden;
      background:#020617;
      display:flex;
      flex-direction:column;
    }

    .viewer iframe{
      border:0;
      width:100%;
      height:100%;
    }

    .back-btn{
      position:absolute;
      top:10px;
      left:10px;
      z-index:10;
      border-radius:999px;
      border:1px solid var(--border);
      padding:6px 12px;
      font-size:13px;
      background:rgba(15,23,42,.9);
      color:var(--fg);
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .back-btn:hover{ border-color:var(--accent); }

    .hidden{ display:none !important; }

    @media (max-width: 600px){
      main{ padding:10px; }
      .title{ font-size:18px; }
      .grid{ grid-template-columns:1fr; }
      .section-header{ flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>
  <img class="bg" src="assets/BG ANALYTICS.png" alt="CentroNet Analytics" />

  <div class="app" id="app">
    <main id="main">
      <section class="menu-grid" id="menu">
        <div>
          <h1 class="title">CENTRONET ANALYTICS</h1>
          <p class="subtitle">Selecciona un panel para abrir</p>
        </div>

        <!-- ✅ SECCIÓN 1: CLIENTES -->
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">Clientes CentroNet</h2>
            <p class="section-desc">Reportes compartidos con clientes</p>
          </div>

          <div class="grid" aria-label="Reportes de clientes">
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiNGU3OWUzMjQtMmM3OS00MDE1LWIzMWEtMzFhNTg5ZGJiZDA3IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI ZEISS</span>
              <small>Óptica ZEISS</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiNzQxYmY1M2QtYjg3Yy00NzljLTlhOWYtYTg2N2JlZjRkYjJmIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI QBANO</span>
              <small>Qbano</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiOWQyNzNhNmYtZjZhZS00NzVkLTk0MzQtYWVjYTYxMWMxMTY1IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI ICESI - TQ</span>
              <small>Icesi - TQ</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiYmY0NWVhMjAtYTNhMi00ZDJkLTliZDYtY2QxZjY4ZmZjMWNlIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>MARATON DEL VALLE</span>
              <small>Maraton del valle</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiOTZmOGYwYWYtNTNjZi00MGUyLWJiMDMtYWU0Zjc0YjUwY2U3IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI CALZATODO</span>
              <small>Calzatodo</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiMDE5MjMwZTctM2YzYi00Yzk1LWE0NmUtZTgyNWY2Y2M5Y2Y0IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI CCC</span>
              <small>Cámara de Comercio de Cali</small>
            </button>
            
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiYjlkY2U4OTEtZDAwYS00MWE2LWFhMjEtZDk5ZGQ0OGI2ODRmIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PACIFIC CENTER</span>
              <small>Pacific Center</small>
            </button>
            
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiNjc3ZTNkMTktZGU5OS00MmEzLWJiNjEtZTIzYjg3Yjk5NDUxIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI FRISBY</span>
              <small>Frisby</small>
            </button>
            
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiYmQ0NGM4MTUtMWZiMS00NmFiLTg3ODktMWU2ZmNiMGE2ZDVhIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI JARAMILLO MORA</span>
              <small>Jaramillo Mora</small>
            </button>
                        
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiMTIyZmJhNmItODgyZS00NDUyLWJhZGMtYTlkMzFlYTgxZmU3IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI MALL PLAZA</span>
              <small>Centro comercial MallPlaza</small>
            </button>
          </div>
        </div>

        <!-- ✅ SECCIÓN 2: INTERNOS -->
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">CENTRONET</h2>
            <p class="section-desc">Dashboards de uso interno</p>
          </div>

          <div class="grid" aria-label="Reportes internos">
            <!-- Ejemplos (cámbialos por tus links internos) -->
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiMjc5ODgyOTAtY2ZlNC00MTZiLWFmZTAtOTU1YjViM2RjMDdjIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI VENTAS</span>
              <small>Ventas CENTRONET</small>
            </button>

            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiMTc2NmYwYjEtOGU2Ni00OTgxLThiOGUtM2M0YjJkM2EwODc1IiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI CARTERA</span>
              <small>Cartera CENTRONET</small>
            </button>
            
            <button class="rbtn" data-src="https://app.powerbi.com/view?r=eyJrIjoiNzM4NjBkMTUtM2IxNi00NWVmLWI1OGUtNWRhMjVhOGIzNGRlIiwidCI6ImEyNGFlYmMxLWMwNzctNDA5My1hNzZiLTVlYTE4NTcxMTk1NiJ9">
              <span>PBI INVENTARIO</span>
              <small>Inventario CENTRONET</small>
            </button>
          </div>
        </div>
      </section>

      <section class="viewer hidden" id="viewer">
        <button class="back-btn" id="backBtn">← Volver al menú</button>
        <iframe id="frame" allowfullscreen title="Power BI"></iframe>
      </section>
    </main>
  </div>

  <script>
    const menu = document.getElementById('menu');
    const viewer = document.getElementById('viewer');
    const frame = document.getElementById('frame');
    const backBtn = document.getElementById('backBtn');
    const buttons = Array.from(document.querySelectorAll('.rbtn'));

    function openReport(btn){
      const src = btn.dataset.src;
      if(!src) return;

      if(frame.src !== src){
        frame.src = src;
      }

      menu.classList.add('hidden');
      viewer.classList.remove('hidden');
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => openReport(btn));
    });

    backBtn.addEventListener('click', () => {
      viewer.classList.add('hidden');
      menu.classList.remove('hidden');
    });
  </script>
</body>
</html>
